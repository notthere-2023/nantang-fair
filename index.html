<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>南塘赶集会</title>
<style>
  :root {
    --bg: #fdf6ec;
    --card-bg: #f7f0e3;
    --orange: #e57917;
    --orange2: #ee752c;
    --yellow: #ffeb3b;
    --text: #3a2f28;
    --text-light: #9a8a7a;
    --green: #5a8a6a;
    --amber: #c4944a;
    --grey: #9a8a7a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
    line-height: 1.8;
  }

  /* Nav */
  nav {
    background: var(--bg);
    border-bottom: 1px solid #e8dcc8;
    padding: 16px 32px;
    display: flex;
    gap: 32px;
    justify-content: center;
    position: sticky; top: 0; z-index: 100;
  }
  nav a {
    color: var(--text);
    text-decoration: none;
    font-size: 15px;
    padding: 4px 12px;
    border-radius: 6px;
    transition: background 0.2s;
  }
  nav a:hover { background: var(--yellow); }
  nav a.current { color: var(--orange); font-weight: 700; }

  /* Hero */
  .hero {
    text-align: center;
    padding: 64px 32px 48px;
  }
  .hero h1 { font-size: 36px; font-weight: 800; margin-bottom: 8px; }
  .hero .subtitle { color: var(--text-light); font-size: 16px; margin-bottom: 40px; }

  /* Big numbers */
  .stats { display: flex; justify-content: center; gap: 48px; flex-wrap: wrap; margin-bottom: 48px; }
  .stat { text-align: center; }
  .stat .num { font-size: 56px; font-weight: 900; color: var(--orange); line-height: 1.2; }
  .stat .label { font-size: 14px; color: var(--text-light); }

  /* Section */
  .section { max-width: 900px; margin: 0 auto; padding: 32px; }
  .section h2 { font-size: 22px; margin-bottom: 20px; }

  /* Entry cards */
  .entries { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .entry {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 32px 24px;
    text-align: center;
    flex: 1; min-width: 200px; max-width: 320px;
    text-decoration: none; color: var(--text);
    border: 1px solid #e8dcc8;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .entry:hover {
    transform: translateY(-4px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  .entry .icon { font-size: 40px; margin-bottom: 12px; }
  .entry h3 { font-size: 20px; margin-bottom: 6px; }
  .entry p { font-size: 14px; color: var(--text-light); }

  /* Attendance grid */
  .attendance-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(76px, 1fr)); gap: 14px; justify-items: center; }
  .att-cell { text-align: center; }
  .att-cell img { width: 50px; height: 50px; border-radius: 50%; display: block; margin: 0 auto 3px; border: 3px solid transparent; }
  .att-cell.core img { border-color: var(--orange); }
  .att-cell .att-name { font-size: 11px; font-weight: 600; }
  .att-cell .att-count { font-size: 11px; color: var(--orange); font-weight: 700; }

  /* Footer */
  footer {
    text-align: center;
    padding: 48px 32px;
    color: var(--text-light);
    font-size: 13px;
    border-top: 1px solid #e8dcc8;
    margin-top: 48px;
  }
  footer a { color: var(--orange); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="current">首页</a>
  <a href="motions.html">动议</a>
  <a href="people.html">人物</a>
  <a href="struggles.html">不美丽</a>
  <a href="about.html">关于</a>
</nav>

<section class="hero">
  <h1>南塘赶集会</h1>
  <p class="subtitle">支持想行动的伙伴，试着相伴而行。<br>九次聚会，一个季度的记录。</p>

  <div class="stats" id="stats"></div>
</section>

<section class="section">
  <div class="entries">
    <a href="motions.html" class="entry">
      <div class="icon">📋</div>
      <h3>动议墙</h3>
      <p>我们认真讨论过什么</p>
    </a>
    <a href="people.html" class="entry">
      <div class="icon">👥</div>
      <h3>人物志</h3>
      <p>谁在这里，怎样说话</p>
    </a>
    <a href="struggles.html" class="entry">
      <div class="icon">🪨</div>
      <h3>不美丽</h3>
      <p>磕绊的时刻，和磕绊之后</p>
    </a>
  </div>
</section>

<section class="section" id="attendance-section">
  <h2>出席 · 谁一直在</h2>
  <div class="attendance-grid" id="att-grid"></div>
</section>

<footer>
  <p>为第十期赶集会制作 · 数据来自前九期会议记录 · 头像由 <a href="https://dicebear.com" target="_blank">DiceBear</a> 生成</p>
</footer>

<script src="data.js"></script>
<script>
(function() {
  const d = siteData;
  // Stats
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="num">${d.stats.totalSessions}</div><div class="label">期会议</div></div>
    <div class="stat"><div class="num">${d.stats.totalPeople}</div><div class="label">位参与者</div></div>
    <div class="stat"><div class="num">${d.stats.totalMotions}</div><div class="label">项动议</div></div>
    <div class="stat"><div class="num">${d.stats.totalAttendance}</div><div class="label">人次出席</div></div>
  `;

  // Attendance grid — avatar wall
  const style = 'open-peeps';
  const sorted = [...d.people].sort((a,b) => b.attendedCount - a.attendedCount).slice(0, 30);
  document.getElementById('att-grid').innerHTML = sorted.map(p => {
    const url = `https://api.dicebear.com/9.x/${style}/svg?seed=${encodeURIComponent(p.name)}`;
    return `
      <div class="att-cell${p.attendedCount >= 7 ? ' core' : ''}">
        <img src="${url}" alt="${p.name}" loading="lazy"
             onerror="this.outerHTML='<div style=\'width:50px;height:50px;border-radius:50%;background:var(--orange);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;margin:0 auto 3px\'>'+'${p.name[0]}'+'</div>'">
        <div class="att-name">${p.name}</div>
        <div class="att-count">${p.attendedCount}次</div>
      </div>`;
  }).join('');
})();
</script>

</body>
</html>
