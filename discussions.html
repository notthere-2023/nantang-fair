<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>声音 · 赶集会</title>
<style>
  :root {
    --bg: #fdf6ec; --card-bg: #f7f0e3; --orange: #e57917; --orange2: #ee752c;
    --yellow: #ffeb3b; --text: #3a2f28; --text-light: #9a8a7a;
    --green: #5a8a6a; --amber: #c4944a; --grey: #9a8a7a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif; line-height: 1.8; }

  nav {
    background: var(--bg); border-bottom: 1px solid #e8dcc8; padding: 16px 32px;
    display: flex; gap: 32px; justify-content: center; position: sticky; top: 0; z-index: 100;
  }
  nav a { color: var(--text); text-decoration: none; font-size: 15px; padding: 4px 12px; border-radius: 6px; }
  nav a:hover { background: var(--yellow); }
  nav a.current { color: var(--orange); font-weight: 700; }

  .container { max-width: 800px; margin: 0 auto; padding: 40px 24px; }
  h1 { font-size: 28px; margin-bottom: 8px; }
  .subtitle { color: var(--text-light); margin-bottom: 32px; }

  /* Session block */
  .session { margin-bottom: 48px; }
  .session-header {
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 2px solid var(--orange); padding-bottom: 8px; margin-bottom: 16px;
  }
  .session-header h2 { font-size: 20px; }
  .session-header .date { font-size: 14px; color: var(--text-light); }

  /* Time bar */
  .time-bar-wrap { margin-bottom: 16px; }
  .time-bar-label { font-size: 12px; color: var(--text-light); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .time-bar { height: 8px; border-radius: 4px; background: #ede3d0; overflow: hidden; display: flex; }
  .time-bar .disc { background: var(--orange); height: 100%; }
  .time-bar .motion { background: var(--amber); height: 100%; }

  .section-label { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .topics { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .topic-tag {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 13px; background: #fce8d0; color: var(--orange);
  }

  /* Quotes */
  .quotes { margin-bottom: 16px; }
  .quote-item {
    background: var(--card-bg); border-radius: 8px; padding: 12px 16px;
    margin-bottom: 8px; font-size: 14px; font-style: italic;
    border-left: 3px solid var(--orange);
  }
  .quote-item .speaker { font-weight: 700; font-style: normal; display: block; margin-bottom: 4px; font-size: 13px; color: var(--orange); }

  .no-motion { color: var(--text-light); font-style: italic; font-size: 14px; }

  footer { text-align: center; padding: 48px 24px; color: var(--text-light); font-size: 13px; border-top: 1px solid #e8dcc8; margin-top: 40px; }
  footer a { color: var(--orange); }
</style>
</head>
<body>

<nav>
  <a href="index.html">首页</a>
  <a href="discussions.html" class="current">讨论</a>
  <a href="motions.html">动议</a>
  <a href="people.html">人物</a>
  <a href="struggles.html">不美丽</a>
  <a href="about.html">关于</a>
</nav>

<div class="container">
  <h1>讨论</h1>
  <p class="subtitle">九次聚会，每次大家都在<span style="color:var(--orange)">聊什么</span>。</p>
  <div id="content"></div>
</div>

<footer>为第十期赶集会制作 · <a href="about.html">关于这个网站</a></footer>

<script src="data.js"></script>
<script src="session_quotes.js"></script>
<script>
(function() {
  document.getElementById('content').innerHTML = siteData.sessions.map(s => {
    const hasTopics = s.topics.length > 0;

    const discHtml = hasTopics
      ? `<div class="section-label">🗣 讨论了 ${s.topics.length} 个话题</div>
         <div class="topics">${s.topics.map(t => `<span class="topic-tag">${t}</span>`).join('')}</div>`
      : `<div class="section-label">🗣 讨论了</div><div class="no-motion">本期无记录的话题标签</div>`;

    const sq = sessionQuoteData[s.label];
    const quotesHtml = sq && sq.length > 0
      ? `<div class="quotes">${sq.map(q => {
           const av = `https://api.dicebear.com/9.x/open-peeps/svg?seed=${encodeURIComponent(q.name)}`;
           return `<div class="quote-item"><img src="${av}" style="width:24px;height:24px;border-radius:50%;vertical-align:middle;margin-right:6px" onerror="this.style.display='none'"><span class="speaker">${q.name}</span> ${q.quote}</div>`;
         }).join('')}</div>`
      : '';

    return `
      <div class="session">
        <div class="session-header">
          <h2>${s.label}</h2>
          <span class="date">${s.date} · ${s.presentCount}人在线</span>
        </div>
        ${discHtml}
        ${quotesHtml}
      </div>
    `;
  }).join('');
})();
</script>

</body>
</html>
